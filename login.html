<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | GeoTática</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent1: #19c2ff;
      --accent2: #3b2ccf;
      --accent3: #7c3aed;
      --text: #182033;
      --muted: #5b6480;
      --border: rgba(76,110,245,0.12);
      --shadow: 0 24px 56px rgba(31,41,55,0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 10%, rgba(25, 194, 255, 0.14), transparent 22%),
        radial-gradient(circle at 88% 18%, rgba(59, 44, 207, 0.10), transparent 24%),
        linear-gradient(180deg, #f9fbff 0%, #f4f8fd 48%, #eef4fb 100%);
    }
    .card {
      width: min(460px, 100%);
      background: rgba(255,255,255,0.95);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .topbar {
      height: 6px;
      background: linear-gradient(90deg, var(--accent1), var(--accent2), var(--accent3));
    }
    .content { padding: 30px; }
    .badge {
      display: inline-block;
      margin-bottom: 12px;
      padding: 7px 14px;
      border-radius: 999px;
      background: rgba(59,44,207,0.06);
      border: 1px solid rgba(59,44,207,0.10);
      color: var(--accent2);
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 1.8px;
      text-transform: uppercase;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 34px;
      line-height: 1.05;
      margin-bottom: 10px;
      color: var(--text);
    }
    p {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 18px;
    }
    .field { margin-bottom: 14px; }
    label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    input {
      width: 100%;
      min-height: 50px;
      border-radius: 14px;
      border: 1px solid var(--border);
      padding: 0 14px;
      font-size: 14px;
      color: var(--text);
      background: rgba(255,255,255,0.96);
      outline: none;
    }
    input:focus {
      border-color: rgba(25,194,255,0.55);
      box-shadow: 0 0 0 5px rgba(25,194,255,0.10);
    }
    .actions {
      display: grid;
      gap: 10px;
      margin-top: 8px;
    }
    button {
      min-height: 48px;
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }
    .primary {
      color: white;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      box-shadow: 0 12px 28px rgba(59,44,207,0.16);
    }
    .secondary {
      color: var(--accent2);
      background: rgba(255,255,255,0.92);
      border: 1px solid var(--border);
    }
    .msg {
      margin-top: 14px;
      min-height: 22px;
      font-size: 14px;
      color: var(--muted);
    }
    .msg.error { color: #b42318; }
    .msg.ok { color: #027a48; }
    .beta-note {
      margin-top: 18px;
      padding: 13px 14px;
      border-radius: 16px;
      background: rgba(59,44,207,0.05);
      border: 1px solid rgba(59,44,207,0.10);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="topbar"></div>
    <div class="content">
      <div class="badge">GeoTática | acesso privado</div>
      <h1>Entrar</h1>
      <p>Faça login para acessar o catálogo privado. Para participar do beta, solicite um Login beta e aguarde a liberação manual do usuário no Firebase.</p>

      <div class="field">
        <label for="email">E-mail</label>
        <input id="email" type="email" placeholder="seuemail@dominio.com">
      </div>

      <div class="field">
        <label for="password">Senha</label>
        <input id="password" type="password" placeholder="Sua senha">
      </div>

      <div style="margin:-4px 0 14px;">
        <a href="#" onclick="resetPassword(event)" style="color:#3b2ccf;text-decoration:none;font-size:14px;">Esqueci minha senha</a>
      </div>

      <div class="actions">
        <button class="primary" onclick="login()">Entrar</button>
        <button class="secondary" onclick="requestBetaAccess()">Solicitar acesso beta</button>
        <button class="secondary" onclick="goBack()">Voltar</button>
      </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyAWmlXK8lJIm4eiy5NSi9adNyO4ppgcyaM",
      authDomain: "geotatica-efa61.firebaseapp.com",
      projectId: "geotatica-efa61",
      storageBucket: "geotatica-efa61.appspot.com",
      messagingSenderId: "658834081269",
      appId: "1:658834081269:web:44f48a22648557d23f8cbc"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    const msg = document.getElementById('message');

    function setMessage(text, kind) {
      msg.textContent = text || "";
      msg.className = "msg" + (kind ? " " + kind : "");
    }

    function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        setMessage("Preencha e-mail e senha.", "error");
        return;
      }

      setMessage("Entrando...", "");

      firebase.auth().signInWithEmailAndPassword(email, password)
        .then(() => {
          setMessage("Login realizado com sucesso.", "ok");
          const params = new URLSearchParams(window.location.search);
          const redirect = params.get("redirect") || "https://geotatica.github.io/Plataforma_Dados/";
          window.location.href = redirect;
        })
        .catch((error) => {
          setMessage("Não foi possível entrar. Verifique e-mail e senha.", "error");
          console.error(error);
        });
    }

    function resetPassword(event) {
      if (event) event.preventDefault();

      const email = document.getElementById('email').value.trim();

      if (!email) {
        setMessage("Digite seu e-mail para redefinir a senha.", "error");
        return;
      }

      setMessage("Enviando e-mail de redefinição...", "");

      firebase.auth().sendPasswordResetEmail(email)
        .then(() => {
          setMessage("Enviamos um link de redefinição para seu e-mail.", "ok");
        })
        .catch((error) => {
          console.error(error);
          setMessage("Não foi possível enviar o e-mail de redefinição. Verifique o e-mail informado.", "error");
        });
    }

    var GEOTATICA_BETA_EMAIL = "geo.daniellecorrea@gmail.com";

    function requestBetaAccess() {
      const subject = "Solicitação de Login beta | GeoTática";
      const body = "Olá, Danielle. Gostaria de solicitar um Login beta para acessar a plataforma GeoTática.\n\nTipo de acesso solicitado: Login beta\nNome:\nE-mail para cadastro no Firebase:\nÁrea de atuação:\nCidade/Estado:\nComo pretende usar a plataforma?:\nDeseja receber aviso sobre os planos pagos? Sim/Não\n\nObservação para cadastro: favor identificar este usuário como Login beta, para diferenciar dos acessos administrativos e futuros clientes pagantes.\n";
      window.location.href = "mailto:" + encodeURIComponent(GEOTATICA_BETA_EMAIL) + "?subject=" + encodeURIComponent(subject) + "&body=" + encodeURIComponent(body);
    }

    function goBack() {
      history.back();
    }

    document.getElementById('password').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
